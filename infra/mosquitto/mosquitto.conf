listener 1883
allow_anonymous true
persistence true
persistence_location /mosquitto/data/

# Solo alcanzable dentro de clauboard-net (no publicado al host),
# por eso allow_anonymous es aceptable aquí. Si algún día publicas
# el puerto 1883 al host o a la red del homelab, cambia esto a
# password_file + un usuario, igual que ya haces en tu SBC.