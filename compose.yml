services:

  backend:
    build: ./backend
    container_name: nexus-backend

    ports:
      - "8000:8000"

    volumes:
      - ./backend/app:/app
      - /var/run/docker.sock:/var/run/docker.sock

    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    container_name: nexus-frontend

    ports:
      - "8080:80"


