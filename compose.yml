networks:
  clauboard-net:
    name: clauboard-net

services:

  proxy:
    image: nginx:alpine
    container_name: clauboard-proxy
    ports:
      - "80:80"
    volumes:
      - ./proxy/conf.d:/etc/nginx/conf.d:ro
    networks:
      - clauboard-net

  backend:
    build: ./backend
    container_name: clauboard-backend

    ports:
      - "8000:8000"

    volumes:
      - ./backend:/workspace
      - ./plugins:/plugins
      - /var/run/docker.sock:/var/run/docker.sock

    networks:
      - clauboard-net

    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload

  frontend:
    build: ./frontend
    container_name: clauboard-frontend

    ports:
      - "8080:80"

    networks:
      - clauboard-net