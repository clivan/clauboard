id: syncthing

name: Syncthing

description: Continuous file synchronization

image: syncthing/syncthing:latest

container_name: syncthing

restart: unless-stopped

primary_port: 8384

ports:

  - host: 8384
    container: 8384

  - host: 22000
    container: 22000
    protocol: tcp

  - host: 22000
    container: 22000
    protocol: udp

volumes:

  - host: /home/claudio/Sync
    container: /var/syncthing

environment:

  TZ: America/Mexico_City

labels:

  clauboard.managed: "true"

icon: syncthing.svg