id: adminer
name: Adminer
description: Cliente web ligero para Postgres/MySQL (compañero de Postgres)
type: service
image: adminer:latest
container_name: adminer
restart: unless-stopped
primary_port: 8080
ports:
  - host: 8083
    container: 8080
environment:
  ADMINER_DEFAULT_SERVER: clauboard-postgres
labels:
  clauboard.managed: "true"
icon: adminer.svg